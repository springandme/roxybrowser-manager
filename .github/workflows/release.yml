name: Build and Release

on:
  push:
    tags:
      - 'v*'

# 设置环境变量
env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # 构建 macOS (Apple Silicon M芯片)
  build-macos:
    runs-on: macos-14  # macos-14 默认使用 M1 芯片
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri App for macOS (ARM64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RoxyBrowser Manager ${{ github.ref_name }}'
          releaseBody: |
            ## 🚀 RoxyBrowser Manager ${{ github.ref_name }}
            
            ### 📥 下载说明
            
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | **macOS (Apple Silicon)** | `.dmg` | 适用于 M1/M2/M3 芯片的 Mac |
            | **Windows** | `.exe` | Windows 安装程序 |
            
            ### ⚠️ 安装说明
            
            **macOS**: 如果遇到"无法打开"的提示，请在系统偏好设置 > 安全性与隐私 中允许运行。
            
            **Windows**: 如果遇到 SmartScreen 警告，请选择"仍要运行"。
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          tauriScript: npm run tauri
          args: --target aarch64-apple-darwin

  # 构建 Windows x64
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri App for Windows
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build outputs
        run: |
          echo "Checking build outputs..."
          dir src-tauri\target\release\bundle\ -Recurse

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
